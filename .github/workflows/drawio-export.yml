name: Export draw.io diagrams

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.drawio'
      - '.github/workflows/drawio-export.yml'

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # drawio-export-action default `action-mode: auto` compares against git history; shallow clone errors.
          fetch-depth: 0

      - name: Export shared-examples draw.io diagrams
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: shared-examples-domain/docs
          format: png
          output: .
          transparent: false

      - name: Export user-docs draw.io diagrams
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs/user/assets
          format: png
          output: .
          transparent: false

      # drawio-export emits *.drawio.png; user guides link to *.png next to the .drawio sources
      - name: Align user-asset PNG names with documentation
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in docs/user/assets/*.drawio.png; do
            base="${f%.drawio.png}"
            mv -f "$f" "${base}.png"
          done

      - name: Commit exported images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-export draw.io diagrams to PNG"
          # After export, commit everything under the diagram trees (drawio, *.drawio.png, *.png, etc.)
          # so we are not limited to a single filename pattern and git-add does not error on a missing pathspec.
          file_pattern: 'shared-examples-domain/docs docs/user/assets'
          disable_globbing: true

# Spring Boot
spring.application.name=wallet-example-app
spring.mvc.problemdetails.enabled=true
spring.threads.virtual.enabled=true
spring.main.keep-alive=true
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/wallet_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Crablet Views
crablet.views.enabled=true
crablet.views.polling-interval-ms=1000
crablet.views.batch-size=100
# Shared-fetch mode: one DB query per cycle serves all views (requires V14 migration)
# crablet.views.shared-fetch.enabled=true
# crablet.views.fetch-batch-size=1000

# Crablet Automations
crablet.automations.enabled=true
crablet.automations.polling-interval-ms=1000
crablet.automations.batch-size=100

# Crablet Outbox
crablet.outbox.enabled=true
crablet.outbox.polling-interval-ms=1000
crablet.outbox.topics.topics.wallet-events.publishers=LogPublisher
# Add wallet-webhook to the publishers list and set this URL to deliver events to an HTTP endpoint.
# crablet.outbox.topics.topics.wallet-events.publishers=LogPublisher,wallet-webhook
# crablet.wallet.webhook.url=http://localhost:9090/events

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
# Enable histogram buckets so Grafana P95 panels work (histogram_quantile requires _bucket series)
management.metrics.distribution.percentiles-histogram.eventstore.commands.duration=true
management.metrics.distribution.percentiles-histogram.views.projection.duration=true
management.metrics.distribution.percentiles-histogram.outbox.publishing.duration=true
management.metrics.distribution.percentiles-histogram.automations.execution.duration=true

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Management Dashboard
# UI: http://localhost:8080/dashboard

# Logging
logging.level.com.crablet=INFO
logging.level.org.springframework.web=INFO

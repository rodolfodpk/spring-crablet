global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: crablet-wallet-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080  # Mac/Windows: resolves to the host machine
          # Linux: uncomment the extra_hosts below in docker-compose.yml and use host.docker.internal:8080
          # Or replace with your host IP, e.g.: 172.17.0.1:8080

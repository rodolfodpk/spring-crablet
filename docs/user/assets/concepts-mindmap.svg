<?xml version="1.0" encoding="UTF-8"?>
<svg id="mindmap" class="markmap mindmap" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="2000" height="1100" viewBox="0 0 2000 1100"><style>.markmap {
  --markmap-max-width: 9999px;
  --markmap-a-color: #0097e6;
  --markmap-a-hover-color: #00a8ff;
  --markmap-code-bg: #f0f0f0;
  --markmap-code-color: #555;
  --markmap-highlight-bg: #ffeaa7;
  --markmap-table-border: 1px solid currentColor;
  --markmap-font: 300 16px/20px sans-serif;
  --markmap-circle-open-bg: #fff;
  --markmap-text-color: #333;
  --markmap-highlight-node-bg: #ff02;

  font: var(--markmap-font);
  color: var(--markmap-text-color);
}

  .markmap-link {
    fill: none;
  }

  .markmap-node &gt; circle {
      cursor: pointer;
    }

  .markmap-foreign {
    display: inline-block;
  }

  .markmap-foreign p {
      margin: 0;
    }

  .markmap-foreign a {
      color: var(--markmap-a-color);
    }

  .markmap-foreign a:hover {
        color: var(--markmap-a-hover-color);
      }

  .markmap-foreign code {
      padding: 0.25em;
      font-size: calc(1em - 2px);
      color: var(--markmap-code-color);
      background-color: var(--markmap-code-bg);
      border-radius: 2px;
    }

  .markmap-foreign pre {
      margin: 0;
    }

  .markmap-foreign pre &gt; code {
        display: block;
      }

  .markmap-foreign del {
      text-decoration: line-through;
    }

  .markmap-foreign em {
      font-style: italic;
    }

  .markmap-foreign strong {
      font-weight: bold;
    }

  .markmap-foreign mark {
      background: var(--markmap-highlight-bg);
    }

  .markmap-foreign table,
    .markmap-foreign th,
    .markmap-foreign td {
      border-collapse: collapse;
      border: var(--markmap-table-border);
    }

  .markmap-foreign img {
      display: inline-block;
    }

  .markmap-foreign svg {
      fill: currentColor;
    }

  .markmap-foreign &gt; div {
      width: var(--markmap-max-width);
      text-align: left;
    }

  .markmap-foreign &gt; div &gt; div {
        display: inline-block;
      }

  .markmap-highlight rect {
    fill: var(--markmap-highlight-node-bg);
  }

.markmap-dark .markmap {
  --markmap-code-bg: #1a1b26;
  --markmap-code-color: #ddd;
  --markmap-circle-open-bg: #444;
  --markmap-text-color: #eee;
}
</style><g transform="translate(641,550) scale(2)"><path class="markmap-link" data-depth="2" data-path="1.2" d="M118,11.25C158,11.25,158,-42.625,198,-42.625" stroke-width="1.75" stroke="rgb(255, 127, 14)"></path><path class="markmap-link" data-depth="2" data-path="1.20" d="M118,11.25C158,11.25,158,-15.875,198,-15.875" stroke-width="1.75" stroke="rgb(23, 190, 207)"></path><path class="markmap-link" data-depth="2" data-path="1.51" d="M118,11.25C158,11.25,158,10.875,198,10.875" stroke-width="1.75" stroke="rgb(31, 119, 180)"></path><path class="markmap-link" data-depth="2" data-path="1.65" d="M118,11.25C158,11.25,158,37.625,198,37.625" stroke-width="1.75" stroke="rgb(148, 103, 189)"></path><path class="markmap-link" data-depth="2" data-path="1.92" d="M118,11.25C158,11.25,158,64.375,198,64.375" stroke-width="1.75" stroke="rgb(255, 127, 14)"></path><g class="markmap-highlight"></g><g data-depth="2" data-path="1.2" class="markmap-node markmap-fold" transform="translate(198, -63.5)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="125" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="#ff7f0e" cx="123" cy="20.875"></circle><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">Core Concepts</div></div></foreignObject></g><g data-depth="2" data-path="1.20" class="markmap-node markmap-fold" transform="translate(198, -36.75)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="163" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#17becf" fill="#17becf" cx="161" cy="20.875"></circle><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="145" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">Framework Modules</div></div></foreignObject></g><g data-depth="2" data-path="1.51" class="markmap-node markmap-fold" transform="translate(198, -10)"><line stroke="#1f77b4" stroke-width="1.75" x1="-1" x2="88" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="#1f77b4" cx="86" cy="20.875"></circle><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="70" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">Examples</div></div></foreignObject></g><g data-depth="2" data-path="1.65" class="markmap-node markmap-fold" transform="translate(198, 16.75)"><line stroke="#9467bd" stroke-width="1.75" x1="-1" x2="88" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#9467bd" fill="#9467bd" cx="86" cy="20.875"></circle><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="70" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">AI Tooling</div></div></foreignObject></g><g data-depth="2" data-path="1.92" class="markmap-node markmap-fold" transform="translate(198, 43.5)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="96" y1="20.875" y2="20.875"></line><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="#ff7f0e" cx="94" cy="20.875"></circle><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="78" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">Operations</div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="120" y1="21.25" y2="21.25"></line><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="118" cy="21.25"></circle><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="102" height="20"><div><div xmlns="http://www.w3.org/1999/xhtml">Spring Crablet</div></div></foreignObject></g></g></svg>
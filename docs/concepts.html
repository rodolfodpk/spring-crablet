<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concepts — Spring-Crablet</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib/dist/browser/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view/dist/browser/index.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      background: #f1f0eb;
      color: #1f2937;
      padding: 12px 24px;
    }
    nav { margin-bottom: 20px; }
    nav a {
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #111827; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 16px; }
    .note {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 6px;
      padding: 8px 14px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #166534;
    }
    kbd {
      background: #e5e7eb;
      border: 1px solid #9ca3af;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
      color: #374151;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .controls button {
      background: #faf8f3;
      border: 1px solid #d6c8aa;
      border-radius: 6px;
      padding: 5px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
    }
    .controls button:hover { background: #f0ebe0; border-color: #b5a48a; }
    .markmap-wrap {
      border-radius: 8px;
      border: 1px solid #d6c8aa;
      background: #fff;
      overflow: hidden;
    }
    .markmap {
      display: block;
      width: 100%;
      height: calc(100vh - 110px);
      min-height: 500px;
    }
    .markmap svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="note">
    Interactive mind map — click nodes to expand/collapse, scroll to pan, <kbd>+</kbd> / <kbd>-</kbd> to zoom, <kbd>0</kbd> to fit.
    <a href="index.html" style="margin-left:12px;color:#166534;font-weight:600;">← Back</a>
  </div>

  <div class="controls">
    <button id="btn-zoomin">＋ Zoom in</button>
    <button id="btn-zoomout">－ Zoom out</button>
    <button id="btn-fit">⊙ Fit</button>
  </div>
  <div class="markmap-wrap">
    <svg id="mindmap" class="markmap"></svg>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('examples/concepts.md')
        .then(r => r.text())
        .then(md => {
          const { Transformer } = window.markmap;
          const { Markmap }     = window.markmap;
          const transformer = new Transformer();
          const { root } = transformer.transform(md);
          const mm = Markmap.create('#mindmap', { initialExpandLevel: 2 }, root);
          const svg = d3.select('#mindmap');
          const zoomIn  = () => mm.zoom.scaleBy(svg.transition().duration(300), 1.3);
          const zoomOut = () => mm.zoom.scaleBy(svg.transition().duration(300), 1/1.3);
          const fit     = () => mm.fit();

          document.getElementById('btn-zoomin') .addEventListener('click', zoomIn);
          document.getElementById('btn-zoomout').addEventListener('click', zoomOut);
          document.getElementById('btn-fit')    .addEventListener('click', fit);

          document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
            if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
            if (e.key === '0')                  { e.preventDefault(); fit(); }
          });
        })
        .catch(err => {
          document.querySelector('.markmap-wrap').innerHTML =
            `<p style="padding:16px;color:#dc2626">Failed to load mind map: ${err.message}</p>`;
        });
    });
  </script>
</body>
</html>

# Renderer-only extensions for the course enrollment event modeling diagram.
# This file is NOT a codegen input — do not feed it to crablet-codegen.
# Loaded and merged alongside course-event-model.yaml (diagram.actors lives in the main file).

triggers:
  - name: "Admin defines course"
    linkedCommand: DefineCourse
    actor: admin
  - name: "Admin changes capacity"
    linkedCommand: ChangeCourseCapacity
    actor: admin
  - name: "Student registers"
    linkedCommand: RegisterStudent
    actor: student
  - name: "Student subscribes"
    linkedCommand: SubscribeStudentToCourse
    actor: student

# StudentSubscribedToCourse spans two tag keys (course_id + student_id) — classic multi-entity DCB.
eventBadges:
  StudentSubscribedToCourse: "multi-entity DCB"

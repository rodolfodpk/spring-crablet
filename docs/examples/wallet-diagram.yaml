# Renderer-only extensions for the wallet event modeling diagram.
# This file is NOT a codegen input — do not feed it to embabel-codegen.
# Loaded and merged alongside wallet-event-model.yaml (which already contains diagram.lanes
# and diagram.assignments). Sidecar values override model.diagram values where defined.

triggers:
  - name: "Customer opens wallet"
    linkedCommand: OpenWallet
    actor: customer
  - name: "Customer deposits"
    linkedCommand: Deposit
    actor: customer
  - name: "Customer withdraws"
    linkedCommand: Withdraw
    actor: customer
  - name: "Customer transfers"
    linkedCommand: TransferMoney
    actor: customer

# WalletOpenedAutomation is diagram-only: it emits SendWelcomeNotificationCommand from the
# notification subdomain. The real implementation deserializes WalletOpened and emits directly
# — no view read needed.
automations:
  - name: WalletOpenedAutomation
    triggeredBy: WalletOpened
    emitsCommand: SendWelcomeNotification

# SendWelcomeNotification is a synthetic visual node (cross-domain automation target).
# Rendered as a command card after the main event timeline columns.
syntheticCommands:
  - name: SendWelcomeNotification
    displayLabel: "SendWelcomeNotification"
    note: "notification subdomain"

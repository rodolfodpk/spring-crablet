<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">Wallet Opened Automation and Outbox Event Modeling Board</title>
  <desc id="desc">Workshop-style event modeling board showing a wallet opening slice with command, event, view, automated trigger, follow-up command, follow-up event, and outbox translation.</desc>
  <defs>
    <style>
      .bg { fill: #f5f1e8; }
      .title { font: 700 28px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #5b6470; }
      .lane-line { stroke: #c9bfae; stroke-width: 3; stroke-dasharray: 10 10; }
      .lane-label { font: 700 21px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #374151; letter-spacing: 1px; }
      .lane-note { font: 400 13px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #6b7280; }
      .sticky-title { font: 700 22px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #111827; }
      .sticky-text { font: 400 16px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #1f2937; }
      .small-note { font: 700 18px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #374151; }
      .small-text { font: 400 15px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #475569; }
      .string { stroke: #6b7280; stroke-width: 3; fill: none; stroke-linecap: round; }
      .dot { fill: #6b7280; }
      .legend { font: 700 16px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #374151; }
      .legend-text { font: 400 15px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #475569; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1180"/>
  <text class="title" x="900" y="52" text-anchor="middle">Wallet Opened with Automation and Outbox</text>
  <text class="subtitle" x="900" y="80" text-anchor="middle">A richer Event Modeling board showing where Crablet automations and translation/outbox fit after the first committed event.</text>

  <line class="lane-line" x1="70" y1="170" x2="1730" y2="170"/>
  <line class="lane-line" x1="70" y1="320" x2="1730" y2="320"/>
  <line class="lane-line" x1="70" y1="470" x2="1730" y2="470"/>
  <line class="lane-line" x1="70" y1="620" x2="1730" y2="620"/>
  <line class="lane-line" x1="70" y1="770" x2="1730" y2="770"/>
  <line class="lane-line" x1="70" y1="920" x2="1730" y2="920"/>
  <line class="lane-line" x1="70" y1="1070" x2="1730" y2="1070"/>

  <text class="lane-label" x="90" y="145">TRIGGER</text>
  <text class="lane-note" x="90" y="165">What starts the flow</text>
  <text class="lane-label" x="90" y="295">COMMAND</text>
  <text class="lane-note" x="90" y="315">Intent to change state</text>
  <text class="lane-label" x="90" y="445">EVENT</text>
  <text class="lane-note" x="90" y="465">Committed business fact</text>
  <text class="lane-label" x="90" y="595">VIEW</text>
  <text class="lane-note" x="90" y="615">Read model or state projection</text>
  <text class="lane-label" x="90" y="745">AUTOMATED TRIGGER</text>
  <text class="lane-note" x="90" y="765">A policy wakes up on an event</text>
  <text class="lane-label" x="90" y="895">COMMAND</text>
  <text class="lane-note" x="90" y="915">Follow-up action decided by automation</text>
  <text class="lane-label" x="90" y="1045">EVENT / TRANSLATION</text>
  <text class="lane-note" x="90" y="1065">New fact plus external publication path</text>

  <path class="string" d="M350 195 C400 230, 405 245, 365 285"/>
  <circle class="dot" cx="350" cy="195" r="5"/>
  <circle class="dot" cx="365" cy="285" r="5"/>
  <path class="string" d="M635 345 C685 385, 690 400, 650 440"/>
  <circle class="dot" cx="635" cy="345" r="5"/>
  <circle class="dot" cx="650" cy="440" r="5"/>
  <path class="string" d="M925 495 C975 535, 980 550, 940 590"/>
  <circle class="dot" cx="925" cy="495" r="5"/>
  <circle class="dot" cx="940" cy="590" r="5"/>
  <path class="string" d="M1215 645 C1265 685, 1270 700, 1230 740"/>
  <circle class="dot" cx="1215" cy="645" r="5"/>
  <circle class="dot" cx="1230" cy="740" r="5"/>
  <path class="string" d="M1455 795 C1505 835, 1510 850, 1470 890"/>
  <circle class="dot" cx="1455" cy="795" r="5"/>
  <circle class="dot" cx="1470" cy="890" r="5"/>
  <path class="string" d="M1470 945 C1535 990, 1590 1010, 1640 1035"/>
  <circle class="dot" cx="1470" cy="945" r="5"/>
  <circle class="dot" cx="1640" cy="1035" r="5"/>
  <path class="string" d="M650 495 C1580 495, 1625 795, 1630 1025"/>
  <circle class="dot" cx="1630" cy="1025" r="5"/>

  <g transform="rotate(-1.8 350 235)" filter="url(#shadow)">
    <rect x="180" y="180" width="340" height="90" rx="6" fill="#ffffff" stroke="#d4d4d8" stroke-width="2"/>
    <rect x="180" y="180" width="340" height="18" fill="#efe7d6"/>
    <text class="sticky-title" x="350" y="226" text-anchor="middle">Customer opens wallet</text>
    <text class="sticky-text" x="350" y="250" text-anchor="middle">UI or API request</text>
  </g>

  <g transform="rotate(1.2 635 385)" filter="url(#shadow)">
    <rect x="455" y="330" width="360" height="100" rx="6" fill="#cfe3ff" stroke="#8cb6ff" stroke-width="2"/>
    <rect x="455" y="330" width="360" height="18" fill="#b9d4ff"/>
    <text class="sticky-title" x="635" y="376" text-anchor="middle">OpenWalletCommand</text>
    <text class="sticky-text" x="635" y="402" text-anchor="middle">walletId, ownerId</text>
  </g>

  <g transform="rotate(-1.1 650 535)" filter="url(#shadow)">
    <rect x="470" y="480" width="360" height="100" rx="6" fill="#f7ea72" stroke="#d2b100" stroke-width="2"/>
    <rect x="470" y="480" width="360" height="18" fill="#f1df48"/>
    <text class="sticky-title" x="650" y="526" text-anchor="middle">WalletOpened</text>
    <text class="sticky-text" x="650" y="552" text-anchor="middle">walletId, ownerId, openedAt</text>
  </g>

  <g transform="rotate(0.9 940 685)" filter="url(#shadow)">
    <rect x="720" y="630" width="440" height="100" rx="6" fill="#b8efb6" stroke="#74c36a" stroke-width="2"/>
    <rect x="720" y="630" width="440" height="18" fill="#9ee09a"/>
    <text class="sticky-title" x="940" y="676" text-anchor="middle">WalletSummaryView</text>
    <text class="sticky-text" x="940" y="702" text-anchor="middle">wallet becomes visible to queries</text>
  </g>

  <g transform="rotate(-1.6 1230 835)" filter="url(#shadow)">
    <rect x="1010" y="780" width="440" height="100" rx="6" fill="#fbd38d" stroke="#d69e2e" stroke-width="2"/>
    <rect x="1010" y="780" width="440" height="18" fill="#f6bf5f"/>
    <text class="sticky-title" x="1230" y="826" text-anchor="middle">WalletOpenedAutomation</text>
    <text class="sticky-text" x="1230" y="852" text-anchor="middle">policy wakes on WalletOpened</text>
  </g>

  <g transform="rotate(1.1 1470 985)" filter="url(#shadow)">
    <rect x="1280" y="930" width="380" height="100" rx="6" fill="#cfe3ff" stroke="#8cb6ff" stroke-width="2"/>
    <rect x="1280" y="930" width="380" height="18" fill="#b9d4ff"/>
    <text class="sticky-title" x="1470" y="976" text-anchor="middle">SendWelcomeNotification</text>
    <text class="sticky-text" x="1470" y="1002" text-anchor="middle">follow-up command</text>
  </g>

  <g transform="rotate(-1.4 1475 1110)" filter="url(#shadow)">
    <rect x="1260" y="1050" width="430" height="110" rx="6" fill="#f7ea72" stroke="#d2b100" stroke-width="2"/>
    <rect x="1260" y="1050" width="430" height="18" fill="#f1df48"/>
    <text class="sticky-title" x="1475" y="1096" text-anchor="middle">WelcomeNotificationSent</text>
    <text class="sticky-text" x="1475" y="1122" text-anchor="middle">new committed fact with idempotency check</text>
  </g>

  <g transform="rotate(1.4 1620 1110)" filter="url(#shadow)">
    <rect x="1475" y="1044" width="250" height="104" rx="6" fill="#f9c4d2" stroke="#db7b97" stroke-width="2"/>
    <rect x="1475" y="1044" width="250" height="18" fill="#f5a8bc"/>
    <text class="sticky-title" x="1600" y="1088" text-anchor="middle">Outbox</text>
    <text class="sticky-text" x="1600" y="1114" text-anchor="middle">LogPublisher /</text>
    <text class="sticky-text" x="1600" y="1136" text-anchor="middle">wallet-webhook</text>
  </g>

  <g transform="rotate(-0.9 310 1015)" filter="url(#shadow)">
    <rect x="110" y="955" width="400" height="120" rx="8" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
    <text class="small-note" x="310" y="993" text-anchor="middle">Why this board is more informative</text>
    <text class="small-text" x="310" y="1021" text-anchor="middle">The first event branches into read-side updates,</text>
    <text class="small-text" x="310" y="1043" text-anchor="middle">automation, and external publication.</text>
  </g>

  <g transform="rotate(0.8 760 1015)" filter="url(#shadow)">
    <rect x="585" y="965" width="350" height="110" rx="8" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
    <text class="small-note" x="760" y="1000" text-anchor="middle">Automation side</text>
    <text class="small-text" x="760" y="1028" text-anchor="middle">Event -&gt; automated trigger -&gt;</text>
    <text class="small-text" x="760" y="1050" text-anchor="middle">follow-up command -&gt; follow-up event</text>
  </g>

  <g transform="rotate(-0.6 1080 1015)" filter="url(#shadow)">
    <rect x="930" y="965" width="300" height="110" rx="8" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
    <text class="small-note" x="1080" y="1000" text-anchor="middle">Translation side</text>
    <text class="small-text" x="1080" y="1028" text-anchor="middle">Committed events become</text>
    <text class="small-text" x="1080" y="1050" text-anchor="middle">eligible for outbox publication</text>
  </g>

  <rect x="1240" y="120" width="460" height="120" rx="10" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
  <text class="legend" x="1270" y="158">Color key</text>
  <rect x="1270" y="176" width="22" height="22" fill="#cfe3ff" stroke="#8cb6ff" stroke-width="2"/>
  <text class="legend-text" x="1304" y="193">command</text>
  <rect x="1390" y="176" width="22" height="22" fill="#f7ea72" stroke="#d2b100" stroke-width="2"/>
  <text class="legend-text" x="1424" y="193">event</text>
  <rect x="1510" y="176" width="22" height="22" fill="#b8efb6" stroke="#74c36a" stroke-width="2"/>
  <text class="legend-text" x="1544" y="193">view</text>
  <rect x="1270" y="208" width="22" height="22" fill="#fbd38d" stroke="#d69e2e" stroke-width="2"/>
  <text class="legend-text" x="1304" y="225">automation</text>
  <rect x="1390" y="208" width="22" height="22" fill="#f9c4d2" stroke="#db7b97" stroke-width="2"/>
  <text class="legend-text" x="1424" y="225">translation / outbox</text>
</svg>

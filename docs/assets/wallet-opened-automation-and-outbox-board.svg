<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1360" viewBox="0 0 1800 1360" role="img" aria-labelledby="title desc">
  <title id="title">Wallet Opened Automation and Outbox Event Modeling Board</title>
  <desc id="desc">Event Modeling board with one main automation chain and two explicit branches from WalletOpened: one to a view and one to outbox publication.</desc>
  <defs>
    <style>
      .bg { fill: #f5f1e8; }
      .title { font: 700 28px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #5b6470; }
      .lane-line { stroke: #c9bfae; stroke-width: 3; stroke-dasharray: 10 10; }
      .lane-label { font: 700 21px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #374151; letter-spacing: 1px; }
      .lane-note { font: 400 13px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #6b7280; }
      .sticky-title { font: 700 22px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #111827; }
      .sticky-text { font: 400 16px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #1f2937; }
      .small-note { font: 700 18px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #374151; }
      .small-text { font: 400 15px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #475569; }
      .legend { font: 700 16px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #374151; }
      .legend-text { font: 400 15px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #475569; }
      .arrow { stroke: #55606e; stroke-width: 4; fill: none; marker-end: url(#arrowhead); stroke-linecap: round; stroke-linejoin: round; }
      .branch-label { font: 700 14px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #55606e; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#55606e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1360"/>
  <text class="title" x="900" y="52" text-anchor="middle">Wallet Opened with Automation and Outbox</text>
  <text class="subtitle" x="900" y="80" text-anchor="middle">One clear command-to-event chain, plus explicit branches from WalletOpened into a view and external publication.</text>

  <line class="lane-line" x1="70" y1="170" x2="1730" y2="170"/>
  <line class="lane-line" x1="70" y1="320" x2="1730" y2="320"/>
  <line class="lane-line" x1="70" y1="470" x2="1730" y2="470"/>
  <line class="lane-line" x1="70" y1="620" x2="1730" y2="620"/>
  <line class="lane-line" x1="70" y1="770" x2="1730" y2="770"/>
  <line class="lane-line" x1="70" y1="920" x2="1730" y2="920"/>
  <line class="lane-line" x1="70" y1="1180" x2="1730" y2="1180"/>

  <text class="lane-label" x="90" y="145">TRIGGER</text>
  <text class="lane-note" x="90" y="165">What starts the flow</text>
  <text class="lane-label" x="90" y="295">COMMAND</text>
  <text class="lane-note" x="90" y="315">Intent to change state</text>
  <text class="lane-label" x="90" y="445">EVENT</text>
  <text class="lane-note" x="90" y="465">Committed business fact</text>
  <text class="lane-label" x="90" y="595">VIEW</text>
  <text class="lane-note" x="90" y="615">Read model</text>
  <text class="lane-label" x="90" y="745">AUTOMATED TRIGGER</text>
  <text class="lane-note" x="90" y="765">Policy wakes up on an event</text>
  <text class="lane-label" x="90" y="895">COMMAND</text>
  <text class="lane-note" x="90" y="915">Follow-up action</text>
  <text class="lane-label" x="90" y="1045">EVENT / TRANSLATION</text>
  <text class="lane-note" x="90" y="1065">Follow-up fact and external publication</text>

  <g filter="url(#shadow)">
    <rect x="520" y="188" width="460" height="88" rx="6" fill="#ffffff" stroke="#d4d4d8" stroke-width="2"/>
    <rect x="520" y="188" width="460" height="18" fill="#efe7d6"/>
    <text class="sticky-title" x="750" y="232" text-anchor="middle">Customer opens wallet</text>
    <text class="sticky-text" x="750" y="256" text-anchor="middle">UI or API request</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="338" width="460" height="92" rx="6" fill="#cfe3ff" stroke="#8cb6ff" stroke-width="2"/>
    <rect x="520" y="338" width="460" height="18" fill="#b9d4ff"/>
    <text class="sticky-title" x="750" y="383" text-anchor="middle">OpenWalletCommand</text>
    <text class="sticky-text" x="750" y="409" text-anchor="middle">walletId, ownerId</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="488" width="460" height="92" rx="6" fill="#f7ea72" stroke="#d2b100" stroke-width="2"/>
    <rect x="520" y="488" width="460" height="18" fill="#f1df48"/>
    <text class="sticky-title" x="750" y="533" text-anchor="middle">WalletOpened</text>
    <text class="sticky-text" x="750" y="559" text-anchor="middle">walletId, ownerId, openedAt</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1130" y="638" width="430" height="92" rx="6" fill="#b8efb6" stroke="#74c36a" stroke-width="2"/>
    <rect x="1130" y="638" width="430" height="18" fill="#9ee09a"/>
    <text class="sticky-title" x="1345" y="683" text-anchor="middle">WalletSummaryView</text>
    <text class="sticky-text" x="1345" y="709" text-anchor="middle">wallet becomes visible to queries</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="788" width="460" height="92" rx="6" fill="#fbd38d" stroke="#d69e2e" stroke-width="2"/>
    <rect x="520" y="788" width="460" height="18" fill="#f6bf5f"/>
    <text class="sticky-title" x="750" y="833" text-anchor="middle">WalletOpenedAutomation</text>
    <text class="sticky-text" x="750" y="859" text-anchor="middle">policy wakes on WalletOpened</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="938" width="460" height="92" rx="6" fill="#cfe3ff" stroke="#8cb6ff" stroke-width="2"/>
    <rect x="520" y="938" width="460" height="18" fill="#b9d4ff"/>
    <text class="sticky-title" x="750" y="983" text-anchor="middle">SendWelcomeNotification</text>
    <text class="sticky-text" x="750" y="1009" text-anchor="middle">follow-up command</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="1078" width="460" height="98" rx="6" fill="#f7ea72" stroke="#d2b100" stroke-width="2"/>
    <rect x="520" y="1078" width="460" height="18" fill="#f1df48"/>
    <text class="sticky-title" x="750" y="1124" text-anchor="middle">WelcomeNotificationSent</text>
    <text class="sticky-text" x="750" y="1150" text-anchor="middle">new committed fact with idempotency check</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1130" y="1078" width="330" height="98" rx="6" fill="#f9c4d2" stroke="#db7b97" stroke-width="2"/>
    <rect x="1130" y="1078" width="330" height="18" fill="#f5a8bc"/>
    <text class="sticky-title" x="1295" y="1124" text-anchor="middle">Outbox Publication</text>
    <text class="sticky-text" x="1295" y="1150" text-anchor="middle">LogPublisher or wallet-webhook</text>
  </g>

  <path class="arrow" d="M750 276 L750 338"/>
  <path class="arrow" d="M750 430 L750 488"/>
  <path class="arrow" d="M750 580 L750 788"/>
  <path class="arrow" d="M750 880 L750 938"/>
  <path class="arrow" d="M750 1030 L750 1078"/>

  <path class="arrow" d="M980 534 L1090 534 L1090 684 L1130 684"/>
  <text class="branch-label" x="1020" y="520">projects to view</text>

  <path class="arrow" d="M980 534 L1055 534 L1055 1127 L1130 1127"/>
  <text class="branch-label" x="1000" y="1110">published externally</text>

  <g filter="url(#shadow)">
    <rect x="140" y="1210" width="420" height="104" rx="8" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
    <text class="small-note" x="350" y="1246" text-anchor="middle">Reading order</text>
    <text class="small-text" x="350" y="1274" text-anchor="middle">Follow the center column top to bottom.</text>
    <text class="small-text" x="350" y="1296" text-anchor="middle">The two right-side arrows are branches from WalletOpened.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="1210" width="430" height="104" rx="8" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
    <text class="small-note" x="835" y="1246" text-anchor="middle">Automation branch</text>
    <text class="small-text" x="835" y="1274" text-anchor="middle">WalletOpened wakes a policy that emits</text>
    <text class="small-text" x="835" y="1296" text-anchor="middle">a follow-up command and a follow-up event.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="1210" width="470" height="104" rx="8" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
    <text class="small-note" x="1345" y="1246" text-anchor="middle">Translation branch</text>
    <text class="small-text" x="1345" y="1274" text-anchor="middle">The original committed event can also fan out to outbox publication</text>
    <text class="small-text" x="1345" y="1296" text-anchor="middle">without waiting for the welcome-notification follow-up event.</text>
  </g>

  <rect x="1220" y="120" width="480" height="120" rx="10" fill="#fffaf1" stroke="#d6c8aa" stroke-width="2"/>
  <text class="legend" x="1250" y="158">Color key</text>
  <rect x="1250" y="176" width="22" height="22" fill="#cfe3ff" stroke="#8cb6ff" stroke-width="2"/>
  <text class="legend-text" x="1284" y="193">command</text>
  <rect x="1370" y="176" width="22" height="22" fill="#f7ea72" stroke="#d2b100" stroke-width="2"/>
  <text class="legend-text" x="1404" y="193">event</text>
  <rect x="1490" y="176" width="22" height="22" fill="#b8efb6" stroke="#74c36a" stroke-width="2"/>
  <text class="legend-text" x="1524" y="193">view</text>
  <rect x="1250" y="208" width="22" height="22" fill="#fbd38d" stroke="#d69e2e" stroke-width="2"/>
  <text class="legend-text" x="1284" y="225">automation</text>
  <rect x="1370" y="208" width="22" height="22" fill="#f9c4d2" stroke="#db7b97" stroke-width="2"/>
  <text class="legend-text" x="1404" y="225">translation / outbox</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Submit Loan Application Event Modeling Board</title>
  <desc id="desc">Classic event modeling board for the loan submission sample with horizontal lanes for trigger, command, event, and view.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .lane-label { font: 700 22px Arial, sans-serif; fill: #334155; }
      .lane-note { font: 400 14px Arial, sans-serif; fill: #64748b; }
      .sticky-text { font: 700 22px Arial, sans-serif; fill: #111827; }
      .sticky-body { font: 400 16px Arial, sans-serif; fill: #1f2937; }
      .callout { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .callout-text { font: 400 16px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="920" rx="24"/>
  <text class="title" x="800" y="54" text-anchor="middle">Submit Loan Application Event Modeling Board</text>
  <text class="subtitle" x="800" y="84" text-anchor="middle">One feature slice shown in classic Event Modeling lanes: trigger, command, event, and view.</text>

  <rect class="lane" x="70" y="130" width="1460" height="138" rx="14"/>
  <rect class="lane" x="70" y="286" width="1460" height="138" rx="14"/>
  <rect class="lane" x="70" y="442" width="1460" height="138" rx="14"/>
  <rect class="lane" x="70" y="598" width="1460" height="138" rx="14"/>

  <text class="lane-label" x="110" y="175">Trigger</text>
  <text class="lane-note" x="110" y="200">User action or inbound API call</text>

  <text class="lane-label" x="110" y="331">Command</text>
  <text class="lane-note" x="110" y="356">Intent to change domain state</text>

  <text class="lane-label" x="110" y="487">Event</text>
  <text class="lane-note" x="110" y="512">Business fact persisted to the event store</text>

  <text class="lane-label" x="110" y="643">View</text>
  <text class="lane-note" x="110" y="668">Query model consumed by reviewers</text>

  <rect x="330" y="155" width="980" height="88" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="3"/>
  <text class="sticky-text" x="820" y="192" text-anchor="middle">Customer submits loan application</text>
  <text class="sticky-body" x="820" y="218" text-anchor="middle">UI form or POST /loan-applications</text>

  <rect x="330" y="311" width="980" height="88" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text class="sticky-text" x="820" y="348" text-anchor="middle">SubmitLoanApplication</text>
  <text class="sticky-body" x="820" y="374" text-anchor="middle">applicationId, customerId, requestedAmount, purpose</text>

  <rect x="330" y="467" width="980" height="88" rx="10" fill="#fef08a" stroke="#ca8a04" stroke-width="3"/>
  <text class="sticky-text" x="820" y="504" text-anchor="middle">LoanApplicationSubmitted</text>
  <text class="sticky-body" x="820" y="530" text-anchor="middle">applicationId, customerId, requestedAmount, purpose, submittedAt</text>

  <rect x="330" y="623" width="980" height="88" rx="10" fill="#bbf7d0" stroke="#15803d" stroke-width="3"/>
  <text class="sticky-text" x="820" y="660" text-anchor="middle">PendingLoanApplications</text>
  <text class="sticky-body" x="820" y="686" text-anchor="middle">reviewer queue with applicationId, customerId, amount, purpose, status, submittedAt</text>

  <path class="arrow" d="M820 243 L820 311"/>
  <path class="arrow" d="M820 399 L820 467"/>
  <path class="arrow" d="M820 555 L820 623"/>

  <rect class="callout" x="80" y="770" width="1440" height="100" rx="12"/>
  <text class="callout-text" x="110" y="812">This first code sample stops at the view pattern. It does not yet add an automation or outbox translation because the slice only needs a write-side fact and a reviewer-facing query.</text>
  <text class="callout-text" x="110" y="840">If a later slice auto-approves applications or publishes notifications, add Event -&gt; View -&gt; Automated Trigger -&gt; Command -&gt; Event or translation lanes on a separate board.</text>
</svg>

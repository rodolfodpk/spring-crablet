domain: LoanApplication
basePackage: com.example.crabletapp

events:
  - name: LoanApplicationSubmitted
    tags: [application_id, customer_id]
    fields:
      - name: applicationId
        type: String
      - name: customerId
        type: String
      - name: requestedAmount
        type: int
      - name: purpose
        type: String
      - name: submittedAt
        type: Instant

commands:
  - name: SubmitLoanApplication
    pattern: idempotent
    produces: [LoanApplicationSubmitted]
    fields:
      - name: applicationId
        type: String
        minLength: 1
      - name: customerId
        type: String
        minLength: 1
      - name: requestedAmount
        type: int
        exclusiveMinimum: 0
      - name: purpose
        type: String
        minLength: 1

views:
  - name: PendingLoanApplications
    reads: [LoanApplicationSubmitted]
    tag: application_id
    fields:
      - name: applicationId
        type: String
      - name: customerId
        type: String
      - name: requestedAmount
        type: int
      - name: purpose
        type: String
      - name: status
        type: String
      - name: submittedAt
        type: Instant

automations: []
outbox: []

# Optional — used by `make k8s` for Kubernetes / KEDA generation (defaults apply if omitted)
# deployment:
#   topology: monolith        # monolith | distributed
#   commandReplicas: 2
#   keda:
#     enabled: false
#     minReplicas: 0
#     pollingInterval: 30

# Optional — renderer/tooling metadata. Java codegen ignores this section entirely.
# Use diagram.actors + triggers[].actor for the canonical Event Modeling board (actors above,
# one event timeline, lanes for bottom section only). Use diagram.lanes without actors for
# horizontal swim-stack diagrams.
# diagram:
#   actors:
#     - id: customer
#       label: Customer
#   lanes:
#     - id: core
#       label: Core Domain
#     - id: integration
#       label: Integration
#   assignments:
#     # CommandName: lane-id
#     # EventName: lane-id

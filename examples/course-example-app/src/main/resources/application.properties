# Spring Boot
spring.application.name=course-example-app
spring.mvc.problemdetails.enabled=true
spring.threads.virtual.enabled=true
spring.main.keep-alive=true
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/course_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration/app

# Crablet Views
crablet.views.enabled=true
crablet.views.polling-interval-ms=1000
crablet.views.batch-size=100

# Crablet Automations
crablet.automations.enabled=true
crablet.automations.polling-interval-ms=1000
crablet.automations.batch-size=100

# Crablet Outbox
crablet.outbox.enabled=true
crablet.outbox.polling-interval-ms=1000
crablet.outbox.topics.topics.course-events.publishers=LogPublisher

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.crablet=INFO
logging.level.org.springframework.web=INFO
